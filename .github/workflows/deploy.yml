name: Deploy Vite to GitHub Pages
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages 
    
    steps:
      - uses: actions/checkout@v4

      - name: Checkout publication renderer
        uses: actions/checkout@v4
        with:
          repository: Axym-Labs/harness-execution
          ref: 318ab1fcf862c2fa57f2305ecd19899f152346f4
          path: .publication-tools

      - name: Install LaTeX-to-HTML dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-urw-base35 texlive-extra-utils texlive-fonts-recommended texlive-latex-extra

      - name: Render embedded LaTeX work pages
        run: |
          python .publication-tools/skills/publish-work/scripts/render-latex-publications.py \
            --source-dir src/content/latex/work \
            --output-dir src/generated/work \
            --site-root . \
            --css-output public/publication.css \
            --metadata-field content_format=html

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy index to 404 for SPA routing
        # ensures client-side routing works on GitHub Pages
        run: |
          cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_CUSTOM_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
